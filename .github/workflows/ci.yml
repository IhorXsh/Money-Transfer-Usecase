name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Docker smoke test
        run: |
          docker build -t money-transfer:ci .
          cid="$(docker run -d -p 18080:8081 -p 19090:9091 money-transfer:ci --app-port=8081 --metrics-port=9091)"
          trap "docker rm -f $cid >/dev/null 2>&1 || true" EXIT

          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:18080/healthz >/dev/null; then
              break
            fi
            sleep 1
          done

          curl -fsS http://127.0.0.1:18080/healthz
          curl -fsS http://127.0.0.1:19090/metrics | grep -q "http_requests_total"
