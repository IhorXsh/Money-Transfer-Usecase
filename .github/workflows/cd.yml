name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Smoke test image locally
        run: |
          docker build -t money-transfer:cd .
          cid="$(docker run -d -p 18080:8081 -p 19090:9091 money-transfer:cd --app-port=8081 --metrics-port=9091)"
          trap "docker rm -f $cid >/dev/null 2>&1 || true" EXIT
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:18080/healthz >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:18080/healthz
          curl -fsS http://127.0.0.1:19090/metrics | grep -q "http_requests_total"

      - name: Set image name
        id: image
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "name=$image" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
